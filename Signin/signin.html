        <div id="form-display">
            <form id="signin-form">
                <h1 class="uppage-title">Connexion</h1> <!--remplace id="signin-title"-->           
                <div class="parent-input">
                    <label for="signin-email-input">Email</label>
                    <input data-key="email" type="email" class="signin-input input-email" placeholder="Email" id="signin-email-input" required>
                </div>
                <div class="parent-input">
                    <label for="signin-password-input">Mot de passe</label>
                    <input data-key="password" type="password" class="signin-input input-password" placeholder="Mot de passe" id="signin-password-input" required>
                </div>
                <div id="parent-button">
                    <button id="signin-button" type="submit">Se connecter</button>
                </div>
            </form>
            <div id="infoBox">
                <div id="securityInfo"></div>
            </div>
        </div>
