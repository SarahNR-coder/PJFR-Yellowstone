    <main>
        <div id="form-display">
            <form id="signup-form">
                <h1 class="uppage-title">Inscription</h1><!--remplace id="signup-title"-->
            
                <div class="parent-input">
                    <label for="signup-email-input">Email</label>
                    <input data-key="email" type="email" class="signup-input input-email" placeholder="Email" id="signup-email-input" required>
                </div>
                <div class="parent-input">
                    <label for="signup-password-input-fst" >Mot de passe</label>
                    <input data-key="password" type="password" class="signup-input input-password passwords-to-match" placeholder="Mot de passe" id="signup-password-input-fst" required>
                </div>
                <div class="parent-input">
                    <label for="signup-password-input-scd">Confirmez Mot de passe</label>
                    <input data-key="password" type="password" class="signup-input
                    input-password passwords-to-match" placeholder="Mot de passe" id="signup-password-input-scd" required>
                </div>
                <div id="parent-button">
                    <button id="signup-button" type="submit">S'inscrire</button>
                </div>
            </form>
            <div id="infoBox">
                <div id="securityInfo"></div>
            </div>
        </div>
